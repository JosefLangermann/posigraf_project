<!DOCTYPE html>
<!--
  ============================================================
  SISTEMA DE RH - POSIGRAF
  Página: Cadastro Manual de Candidatos (cadastro.html)
  ============================================================
  Descrição:
    Permite ao time de RH cadastrar candidatos manualmente,
    sem depender do formulário público de inscrição. Inclui
    listagem dos candidatos existentes com ações de status,
    upload de currículo, seleção de vaga e indicação.

  Dependências:
    - style.css     : Estilos globais do sistema
    - supabase-js   : Cliente do banco de dados
    - cadastro.js   : Lógica de cadastro e listagem
  ============================================================
-->
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Candidatos — RH Posigraf</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<button class="btn-menu-mobile" onclick="toggleSidebar()" aria-label="Abrir menu">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- =====================================================
     SIDEBAR
===================================================== -->
<nav id="sidebar" role="navigation" aria-label="Menu principal">

  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">🏭</div>
    <div>
      <div class="sidebar-logo-texto">Posigraf</div>
      <div class="sidebar-logo-sub">RH System</div>
    </div>
  </div>

  <div class="sidebar-perfil">
    <img id="fotoPerfil" src="https://img.bgstatic.com/multiLang/web/605120c4719cc92a226e9ac6f3049631.jpg" alt="Foto de perfil">
    <div id="nomePerfil" class="nav-secao-titulo" style="color:white;font-size:.85rem;">RH Admin</div>
    <div id="emailPerfil" class="texto-muted" style="font-size:.72rem;">rh@posigraf.com.br</div>
  </div>

  <div class="sidebar-nav">
    <span class="nav-secao-titulo">Menu</span>

    <button class="nav-btn" onclick="irDashboard()">
      <span class="nav-icon">📊</span> Dashboard
    </button>

    <button class="nav-btn ativo" onclick="void(0)">
      <span class="nav-icon">👤</span> Candidatos
    </button>

    <button class="nav-btn" onclick="location.href='vagas.html'">
      <span class="nav-icon">💼</span> Vagas
    </button>

    <button class="nav-btn" onclick="location.href='colaboradores.html'">
      <span class="nav-icon">🏢</span> Colaboradores
    </button>
  </div>

  <div class="sidebar-footer">
    <button class="btn-logout" onclick="logout()">
      <span>↩</span> Sair do sistema
    </button>
  </div>
</nav>

<!-- =====================================================
     CONTEÚDO PRINCIPAL
===================================================== -->
<main id="conteudo">

  <div class="topbar">
    <div>
      <h1 class="topbar-titulo">Candidatos</h1>
      <p class="topbar-subtitulo">Cadastro manual e gestão de candidatos</p>
    </div>
  </div>

  <!-- Grid: formulário + lista -->
  <div style="display:grid; grid-template-columns: 420px 1fr; gap:24px; align-items:start;">

    <!-- ===== FORMULÁRIO DE CADASTRO ===== -->
    <div class="card">
      <div class="card-titulo">Novo Candidato</div>

      <div class="form-grid">
        <!-- Dados pessoais -->
        <div class="form-grupo">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" placeholder="Nome do candidato">
        </div>

        <div class="form-grupo">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" placeholder="000.000.000-00">
        </div>

        <div class="form-grupo">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="email@exemplo.com">
        </div>

        <div class="form-grupo">
          <label for="data_nascimento">Data de Nascimento</label>
          <input type="date" id="data_nascimento">
        </div>

        <div class="form-grupo full">
          <label for="vaga">Vaga</label>
          <select id="vaga"></select>
        </div>

        <!-- Origem do candidato -->
        <div class="form-grupo full">
          <label for="origem">Origem</label>
          <select id="origem" onchange="verificarOrigem()">
            <option value="linkedin">LinkedIn</option>
            <option value="indeed">Indeed</option>
            <option value="github">GitHub</option>
            <option value="gupy">Gupy</option>
            <option value="site">Site da empresa</option>
            <option value="indicacao">Indicação</option>
            <option value="outro">Outro</option>
          </select>
        </div>

        <!-- Campos de indicação (visíveis condicionalmente) -->
        <div id="indicacaoFields" class="campo-condicional full">
          <div class="form-grupo">
            <label for="email_indicador">E-mail corporativo do indicador</label>
            <input type="email" id="email_indicador" placeholder="colaborador@posigraf.com.br" onchange="buscarIndicador()">
          </div>
          <div class="form-grupo">
            <label for="quem_indicou">Nome do colaborador</label>
            <input type="text" id="quem_indicou" placeholder="Preenchido automaticamente" readonly>
          </div>
        </div>

        <!-- Nível de formação -->
        <div class="form-grupo full">
          <label for="tipo_formacao">Formação</label>
          <select id="tipo_formacao">
            <option value="sem_formacao" selected>Sem Formação</option>
            <option value="ensino_medio">Ensino Médio</option>
            <option value="ensino_medio_integrado">Ensino Médio Integrado</option>
            <option value="curso_tecnico">Curso Técnico</option>
            <option value="graduacao">Graduação</option>
            <option value="pos_graduacao">Pós-Graduação</option>
          </select>
        </div>

        <!-- Detalhes da formação (condicionais) -->
        <div id="camposFormacaoDetalhes" class="campo-condicional full">
          <div class="form-grupo">
            <label for="tipo_instituicao">Tipo de Instituição</label>
            <select id="tipo_instituicao">
              <option value="">Selecione</option>
            </select>
          </div>
          <div class="form-grupo">
            <label for="instituicao">Nome da Instituição</label>
            <input type="text" id="instituicao" placeholder="Ex: UTFPR, SENAI">
          </div>
          <div class="form-grupo">
            <label for="curso">Curso</label>
            <input type="text" id="curso" placeholder="Ex: Engenharia Elétrica">
          </div>
        </div>

        <!-- Upload de currículo -->
        <div class="form-grupo full">
          <label for="curriculo">Currículo (PDF, máx. 5MB)</label>
          <input type="file" id="curriculo" accept=".pdf">
        </div>

      </div>

      <!-- Botão de cadastro -->
      <button class="btn-primario mt-md" style="width:100%;" onclick="cadastrar()">
        ➕ Cadastrar Candidato
      </button>
    </div>

    <!-- ===== LISTA DE CANDIDATOS ===== -->
    <div class="card">
      <div class="card-titulo">Lista de Candidatos</div>
      <ul id="lista">
        <li class="loading">Carregando candidatos...</li>
      </ul>
    </div>

  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="cadastro.js"></script>
<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('aberta');
    document.getElementById('sidebarOverlay').classList.toggle('visivel');
  }

  /**
   * Atualiza a visibilidade do campo de indicação com base na origem selecionada.
   * Reutiliza a lógica de verificarOrigem() do cadastro.js mas adiciona a classe CSS.
   */
  document.getElementById('origem').addEventListener('change', function() {
    const div = document.getElementById('indicacaoFields');
    div.classList.toggle('visivel', this.value === 'indicacao');
  });
</script>
</body>
</html>
