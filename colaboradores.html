<!DOCTYPE html>
<!--
  ============================================================
  SISTEMA DE RH - POSIGRAF
  Página: Gestão de Colaboradores (colaboradores.html)
  ============================================================
  Descrição:
    Módulo de gestão de colaboradores ativos na empresa.
    Exibe efetivos (CLT) e temporários (estágio/aprendiz)
    com filtros, busca, ações de desligamento e efetivação.

  Dependências:
    - style.css         : Estilos globais do sistema
    - supabase-js       : Cliente do banco de dados
    - colaboradores.js  : Lógica de listagem e ações
  ============================================================
-->
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colaboradores — RH Posigraf</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<button class="btn-menu-mobile" onclick="toggleSidebar()" aria-label="Abrir menu">☰</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- =====================================================
     SIDEBAR
===================================================== -->
<nav id="sidebar" role="navigation" aria-label="Menu principal">

  <div class="sidebar-logo">
    <div class="sidebar-logo-icon">🏭</div>
    <div>
      <div class="sidebar-logo-texto">Posigraf</div>
      <div class="sidebar-logo-sub">RH System</div>
    </div>
  </div>

  <div class="sidebar-perfil">
    <img id="fotoPerfil" src="https://img.bgstatic.com/multiLang/web/605120c4719cc92a226e9ac6f3049631.jpg" alt="Foto de perfil">
    <div id="nomePerfil" class="nav-secao-titulo" style="color:white;font-size:.85rem;">RH Admin</div>
    <div id="emailPerfil" class="texto-muted" style="font-size:.72rem;">rh@posigraf.com.br</div>
  </div>

  <div class="sidebar-nav">
    <span class="nav-secao-titulo">Menu</span>

    <button class="nav-btn" onclick="irDashboard()">
      <span class="nav-icon">📊</span> Dashboard
    </button>

    <button class="nav-btn" onclick="irCadastro()">
      <span class="nav-icon">👤</span> Candidatos
    </button>

    <button class="nav-btn" onclick="irVagas()">
      <span class="nav-icon">💼</span> Vagas
    </button>

    <button class="nav-btn ativo" onclick="void(0)">
      <span class="nav-icon">🏢</span> Colaboradores
    </button>
  </div>

  <div class="sidebar-footer">
    <button class="btn-logout" onclick="logout()">
      <span>↩</span> Sair do sistema
    </button>
  </div>
</nav>

<!-- =====================================================
     CONTEÚDO PRINCIPAL
===================================================== -->
<main id="conteudo">

  <div class="topbar">
    <div>
      <h1 class="topbar-titulo">Colaboradores</h1>
      <p class="topbar-subtitulo">Equipe ativa, temporários e efetivos</p>
    </div>
  </div>

  <div class="card">
    <div class="card-titulo">Filtros</div>

    <!-- Controles de filtragem -->
    <div class="campo-busca-wrapper">
      <select id="filtro" onchange="carregarColaboradores()">
        <option value="todos">Todos</option>
        <option value="efetivos">Efetivos (CLT)</option>
        <option value="temporarios">Temporários</option>
      </select>
      <input type="text" id="busca" placeholder="🔍 Buscar por nome..." oninput="carregarColaboradores()">
    </div>
  </div>

  <!-- Lista de colaboradores -->
  <div class="card">
    <div class="card-titulo">Lista</div>
    <ul id="lista">
      <li class="loading">Carregando colaboradores...</li>
    </ul>
  </div>

</main>

    <!-- Rodapé público -->
  <p class="inscricao-footer">
    © 2026 The Iris · Powered By Nature's Perversion
  </p>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="colaboradores.js"></script>
<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('aberta');
    document.getElementById('sidebarOverlay').classList.toggle('visivel');
  }
</script>
</body>
</html>
